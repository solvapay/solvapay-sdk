name: Shadow mode (manual)

# Live identity check against a hosted contract-test environment: the npm
# `@solvapay/server` facade binding (WASM FetchTransport) vs the Rust CLI
# (shadow-invoker). Offline self-test runs in the main CI job via
# `pnpm test:contract` / `pnpm shadow:selftest`. This workflow is dispatch-only
# until a hosted contract env exists (see rust-migration-map open handoff items).

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'SOLVAPAY_SHADOW_BASE_URL'
        required: true
        type: string
      enable_stripe:
        description: 'Run requires:stripe scenarios'
        required: false
        type: boolean
        default: false

jobs:
  shadow-live:
    name: Shadow live run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96.0'

      - name: Build shadow-invoker
        working-directory: rust
        run: cargo build -p shadow-invoker

      - name: Run shadow suite
        env:
          SOLVAPAY_SHADOW_BASE_URL: ${{ inputs.base_url }}
          SOLVAPAY_SHADOW_API_KEY: ${{ secrets.SOLVAPAY_SHADOW_API_KEY }}
          SOLVAPAY_SHADOW_ENABLE_STRIPE: ${{ inputs.enable_stripe }}
        run: pnpm shadow:run

      - name: Upload shadow-report.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-report
          path: contract/shadow/output/shadow-report.json
