name: Shadow Ruby (manual)

# Live Ruby contract suite against a hosted backend.
# Offline golden-fixture replay runs in the main CI `ruby-binding` job via
# `rake test`. This workflow is dispatch-only until a hosted contract env exists
# (see rust-migration-map open handoff items). Mirrors `.github/workflows/shadow-python.yml`.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'SOLVAPAY_SHADOW_BASE_URL'
        required: true
        type: string
      enable_stripe:
        description: 'Run requires:stripe scenarios'
        required: false
        type: boolean
        default: false

jobs:
  shadow-ruby-live:
    name: Ruby live contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/bindings/ruby
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby + Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cargo-cache: true
          working-directory: rust/bindings/ruby

      - name: Bundle install
        run: bundle install

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run live Ruby contract suite
        env:
          SOLVAPAY_SHADOW_BASE_URL: ${{ inputs.base_url }}
          SOLVAPAY_SHADOW_API_KEY: ${{ secrets.SOLVAPAY_SHADOW_API_KEY }}
          SOLVAPAY_SHADOW_ENABLE_STRIPE: ${{ inputs.enable_stripe }}
          SOLVAPAY_LIVE_OUT: ${{ github.workspace }}/contract/shadow/output/ruby-live-report.json
        run: |
          mkdir -p "${{ github.workspace }}/contract/shadow/output"
          bundle exec ruby scripts/live_contract.rb

      - name: Upload ruby-live-report.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruby-live-report
          path: contract/shadow/output/ruby-live-report.json
