name: CI

on:
  pull_request:
    branches: [main, dev]
  # Removed 'push' event to prevent duplicate runs when pushing to PR branches
  # pull_request event handles all PR validation
  # For direct pushes to main/dev, consider using branch protection rules
  # or rely on PR-only workflow (recommended: all changes via PR)
  workflow_dispatch:
    inputs:
      skip_link_validation:
        description: 'Skip link validation steps (documentation job only)'
        required: false
        type: boolean
        default: false

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency health
        run: pnpm deps:check

      - name: Run lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build:packages

      - name: Run tests
        run: pnpm test

      - name: Run contract tests
        run: pnpm test:contract

      - name: Check OpenAPI snapshot (offline)
        run: pnpm snapshot:openapi:check

      - name: Check SDK contract manifest (offline)
        run: pnpm manifest:check

      - name: Check TS surface parity (offline)
        run: pnpm parity:check

      - name: overlays.generated.d.ts tsc gate
        working-directory: packages/server
        run: |
          npx tsc --noEmit --strict --moduleResolution bundler --module esnext --target es2022 \
            src/types/overlays.generated.d.ts

      - name: client.generated.d.ts + signature-parity typecheck
        working-directory: packages/server
        run: pnpm test:types

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml pins channel, clippy, rustfmt, wasm32-unknown-unknown
        run: rustup show

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy (unwrap/expect/panic/docs deny)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: no-unwrap ripgrep gate
        run: ./scripts/check-no-unwrap.sh

      - name: cargo build (native)
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: Setup pnpm (shadow selftest)
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Setup Node.js (shadow selftest)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps + build packages (shadow selftest)
        working-directory: .
        run: |
          pnpm install --frozen-lockfile
          pnpm build:packages

      - name: Shadow selftest (offline stub TS↔Rust)
        working-directory: .
        run: pnpm shadow:selftest

      - name: solvapay-dto regen drift
        run: |
          cargo run -q -p dto-gen -- \
            --snapshot ../contract/openapi/sdk-v1.snapshot.json \
            --manifest ../contract/manifest/sdk-contract.yaml \
            --out crates/solvapay-dto/src \
            --ts-out ../packages/server/src/types/overlays.generated.d.ts \
            --ts-client-out ../packages/server/src/types/client.generated.d.ts \
            --ts-parity-out ../packages/server/src/__generated__/signature-parity.generated.test.ts
          GENERATED_PATHS=(
            rust/crates/solvapay-dto
            packages/server/src/types/overlays.generated.d.ts
            packages/server/src/types/client.generated.d.ts
            packages/server/src/__generated__/signature-parity.generated.test.ts
          )
          if ! git -C .. diff --exit-code -- "${GENERATED_PATHS[@]}"; then
            echo "solvapay-dto / generated TS artifacts are out of date — run:" >&2
            echo "  cargo run -p dto-gen -- \\" >&2
            echo "    --snapshot ../contract/openapi/sdk-v1.snapshot.json \\" >&2
            echo "    --manifest ../contract/manifest/sdk-contract.yaml \\" >&2
            echo "    --out crates/solvapay-dto/src \\" >&2
            echo "    --ts-out ../packages/server/src/types/overlays.generated.d.ts \\" >&2
            echo "    --ts-client-out ../packages/server/src/types/client.generated.d.ts \\" >&2
            echo "    --ts-parity-out ../packages/server/src/__generated__/signature-parity.generated.test.ts" >&2
            exit 1
          fi

      - name: @generated header gate
        run: |
          for f in \
            ../packages/server/src/types/overlays.generated.d.ts \
            ../packages/server/src/types/client.generated.d.ts \
            ../packages/server/src/__generated__/signature-parity.generated.test.ts
          do
            if ! grep -q '@generated' "$f"; then
              echo "missing @generated header: $f" >&2
              exit 1
            fi
          done
          echo "OK: @generated headers present"

      - name: Setup Node.js (wasm Fetch harness)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache wasm-bindgen-cli
        id: cache-wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/bin/wasm2es6js
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.126

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm-bindgen-cli.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: cargo build solvapay-core + solvapay-transport (wasm32)
        run: |
          cargo build -p solvapay-core --target wasm32-unknown-unknown
          # FetchTransport is cfg'd in for wasm32 (step 20); reqwest stays native-only.
          cargo build -p solvapay-transport --target wasm32-unknown-unknown

      - name: cargo clippy solvapay-transport (wasm32)
        run: cargo clippy -p solvapay-transport --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: wasm Fetch transport round-trip
        run: ./scripts/test-wasm-transport.sh

      - name: assert tokio absent from solvapay-core / solvapay-transport graphs
        run: |
          # Normal edges only — tokio is allowed as a native test/dev-dep (wiremock).
          for pkg in solvapay-core solvapay-transport; do
            tree="$(cargo tree -p "$pkg" --target wasm32-unknown-unknown --edges normal)"
            if printf '%s\n' "$tree" | grep -qi 'tokio'; then
              echo "tokio must not appear in ${pkg}'s normal dependency graph" >&2
              printf '%s\n' "$tree"
              exit 1
            fi
            echo "OK: tokio absent from ${pkg} normal graph"
          done

      - name: fixture suite (bound pure-core suites; unbound skipped)
        run: cargo run -q -p fixture-runner -- ../contract/fixtures

  # Step 36 — napi-rs Node binding platform matrix (§7.7) + artifact gate.
  node-binding:
    name: node-binding (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: rust/bindings/node
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --platform --release --target x86_64-unknown-linux-gnu --use-napi-cross
            smoke: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npx napi build --platform --release --target aarch64-unknown-linux-gnu --use-napi-cross
            smoke: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npx napi build --platform --release --target x86_64-unknown-linux-musl --cross-compile
            smoke: false
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: npx napi build --platform --release --target aarch64-unknown-linux-musl --cross-compile
            smoke: false
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npx napi build --platform --release --target aarch64-apple-darwin
            smoke: true
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npx napi build --platform --release --target x86_64-apple-darwin
            smoke: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --platform --release --target x86_64-pc-windows-msvc
            smoke: true
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npx napi build --platform --release --target aarch64-pc-windows-msvc
            smoke: false
        node:
          - '22'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install Rust toolchain
        working-directory: rust
        run: rustup show && rustup target add ${{ matrix.settings.target }}

      - name: Setup zig (musl cross)
        if: contains(matrix.settings.target, 'musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install npm deps
        # optionalDependencies are file:./npm/<triple> until first publish.
        run: npm ci

      - name: Ensure npm platform dirs
        run: npx napi create-npm-dirs

      - name: Build binding
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Smoke test (native host)
        if: matrix.settings.smoke
        run: node --test __test__/binding.spec.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            rust/bindings/node/server-native.*.node
            rust/bindings/node/server-native.*.wasm
            rust/bindings/node/server-native.wasi.cjs
            rust/bindings/node/server-native.wasi-browser.js
            rust/bindings/node/wasi-worker*.mjs
            rust/bindings/node/index.js
            rust/bindings/node/index.d.ts
            rust/bindings/node/browser.js
          if-no-files-found: error

  node-binding-wasi:
    name: node-binding (wasm32-wasip1-threads + FORCE_WASI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/bindings/node
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust toolchain + WASI target
        working-directory: rust
        run: rustup show && rustup target add wasm32-wasip1-threads

      - name: Install npm deps
        run: npm ci

      - name: Ensure npm platform dirs
        run: npx napi create-npm-dirs

      - name: Build WASI fallback
        run: npx napi build --platform --release --target wasm32-wasip1-threads

      - name: Smoke test (NAPI_RS_FORCE_WASI=error)
        # CLI ≥3.7: only `true` / `error` force WASI (`1` is ignored).
        run: NAPI_RS_FORCE_WASI=error node --test __test__/binding.spec.mjs

      - name: Upload WASI artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-wasm32-wasip1-threads
          path: |
            rust/bindings/node/server-native.*.wasm
            rust/bindings/node/server-native.wasi.cjs
            rust/bindings/node/server-native.wasi-browser.js
            rust/bindings/node/wasi-worker*.mjs
          if-no-files-found: error

  node-binding-artifacts:
    name: node-binding artifact gate
    runs-on: ubuntu-latest
    needs:
      - node-binding
      - node-binding-wasi
    defaults:
      run:
        working-directory: rust/bindings/node
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Install npm deps (binding)
        run: npm ci

      - name: Ensure npm platform dirs
        run: npx napi create-npm-dirs

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust/bindings/node/ci-artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Place artifacts into npm/ via napi artifacts
        run: |
          # napi artifacts reads binaries from ./artifacts (CLI --output-dir default).
          # WASI glue + loader JS must also sit next to package.json for the move step.
          mkdir -p artifacts
          find ci-artifacts -type f \( -name '*.node' -o -name '*.wasm' \) -exec cp -f {} artifacts/ \;
          find ci-artifacts -type f \( -name '*.wasi.cjs' -o -name 'wasi-worker*' -o -name '*.wasi-browser.js' -o -name 'index.js' -o -name 'index.d.ts' -o -name 'browser.js' \) -exec cp -f {} . \;
          ls -la artifacts/ index.js 2>/dev/null || true
          npx napi artifacts

      - name: Pre-publish artifact gate (hard-fail)
        run: node scripts/check-artifacts.mjs

      # Step 39 — pack publish-shaped tarballs once for the clean-install matrix.
      - name: Get pnpm store directory
        id: pnpm-cache
        working-directory: .
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Pack clean-install package bundle
        working-directory: .
        run: |
          mkdir -p rust/bindings/node/clean-install-bundle
          node rust/bindings/node/scripts/prepare-clean-install-packages.mjs \
            --out-dir rust/bindings/node/clean-install-bundle \
            --require-all

      - name: Upload clean-install package bundle
        uses: actions/upload-artifact@v4
        with:
          name: server-clean-install-packages
          path: rust/bindings/node/clean-install-bundle/
          if-no-files-found: error

  # Step 39 — fresh npm install + public @solvapay/server verifyWebhook (native matrix).
  # Target/host metadata mirrors rust/bindings/node/scripts/targets.mjs (8 × Node 22/24/26 = 24).
  node-clean-install-native:
    name: node clean install (native, ${{ matrix.target.id }}, Node ${{ matrix.node }})
    needs:
      - node-binding-artifacts
    runs-on: ${{ matrix.target.host }}
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24', '26']
        target:
          - id: linux-x64-gnu
            host: ubuntu-24.04
            musl: 'false'
          - id: linux-arm64-gnu
            host: ubuntu-24.04-arm
            musl: 'false'
          - id: linux-x64-musl
            host: ubuntu-24.04
            musl: 'true'
          - id: linux-arm64-musl
            host: ubuntu-24.04-arm
            musl: 'true'
          - id: darwin-x64
            host: macos-15-intel
            musl: 'false'
          - id: darwin-arm64
            host: macos-15
            musl: 'false'
          - id: win32-x64-msvc
            host: windows-latest
            musl: 'false'
          - id: win32-arm64-msvc
            host: windows-11-arm
            musl: 'false'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download clean-install package bundle
        uses: actions/download-artifact@v4
        with:
          name: server-clean-install-packages
          path: clean-install-bundle

      - name: Setup Node.js
        if: matrix.target.musl == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Clean-install smoke (host)
        if: matrix.target.musl == 'false'
        shell: bash
        run: |
          node rust/bindings/node/scripts/clean-install-smoke.mjs \
            --bundle-dir clean-install-bundle \
            --mode native \
            --target "${{ matrix.target.id }}" \
            --node-major "${{ matrix.node }}"

      - name: Clean-install smoke (musl container)
        if: matrix.target.musl == 'true'
        shell: bash
        run: |
          # setup-node / JS actions are glibc — run only the smoke inside Alpine.
          IMAGE="node:${{ matrix.node }}-alpine"
          docker pull "$IMAGE"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/clean-install-bundle:/bundle:ro" \
            -v "$PWD/rust/bindings/node/scripts:/scripts:ro" \
            -e HOME=/tmp \
            -w /tmp \
            "$IMAGE" \
            node /scripts/clean-install-smoke.mjs \
              --bundle-dir /bundle \
              --mode native \
              --target "${{ matrix.target.id }}" \
              --node-major "${{ matrix.node }}"

  # Step 39 — WASI-only clean install (no .node targets) on Linux x64 × Node 22/24/26.
  node-clean-install-wasi:
    name: node clean install (WASI, Node ${{ matrix.node }})
    needs:
      - node-binding-artifacts
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24', '26']
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download clean-install package bundle
        uses: actions/download-artifact@v4
        with:
          name: server-clean-install-packages
          path: clean-install-bundle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Clean-install smoke (WASI)
        shell: bash
        run: |
          node rust/bindings/node/scripts/clean-install-smoke.mjs \
            --bundle-dir clean-install-bundle \
            --mode wasi \
            --target wasm32-wasi \
            --node-major "${{ matrix.node }}"

  # Step 37 — flag-reversible Node verifyWebhook cutover (rust ↔ ts).
  node-binding-conformance:
    name: node-binding conformance (SOLVAPAY_IMPL rust/ts)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Install Rust toolchain (host)
        working-directory: rust
        run: rustup show

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @solvapay/core (server unit deps)
        run: pnpm --filter @solvapay/core build

      - name: Build @solvapay/server-native (host)
        run: pnpm --filter @solvapay/server-native build

      - name: Server unit suite on Rust binding
        run: pnpm --filter @solvapay/server test:unit:rust

      - name: Server unit suite forced back to TypeScript
        run: pnpm --filter @solvapay/server test:unit:ts

  # Step 38 — edge/browser wasm-bindgen cutover (capability split + budgets + Deno).
  wasm-binding:
    name: wasm-binding (Step 38 edge/browser)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Install Rust toolchain
        working-directory: rust
        run: rustup show

      - name: Cache wasm-bindgen-cli
        id: cache-wasm-bindgen-cli-38
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/bin/wasm2es6js
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.126

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm-bindgen-cli-38.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild wasm artifacts + drift check
        working-directory: rust/bindings/wasm
        run: |
          pnpm build:wasm
          pnpm build:check-drift

      - name: Cargo feature / exclusivity checks
        working-directory: rust
        run: |
          cargo check -p solvapay-core
          cargo check -p solvapay-core --no-default-features --features browser
          cargo check -p solvapay-wasm --target wasm32-unknown-unknown --no-default-features --features edge
          cargo check -p solvapay-wasm --target wasm32-unknown-unknown --no-default-features --features browser
          if cargo check -p solvapay-wasm --no-default-features --features edge,browser 2>/dev/null; then
            echo "expected edge+browser to fail" >&2
            exit 1
          fi
          if cargo check -p solvapay-wasm --no-default-features 2>/dev/null; then
            echo "expected neither feature to fail" >&2
            exit 1
          fi

      - name: Native binding unit tests + clippy/fmt gates (wasm crate)
        working-directory: rust
        run: |
          cargo test -p solvapay-wasm --no-default-features --features edge --lib
          cargo fmt --all -- --check
          cargo clippy -p solvapay-wasm --target wasm32-unknown-unknown --no-default-features --features edge -- -D warnings
          cargo clippy -p solvapay-wasm --target wasm32-unknown-unknown --no-default-features --features browser -- -D warnings
          ./scripts/check-no-unwrap.sh

      - name: Browser symbol audit
        working-directory: rust/bindings/wasm
        run: pnpm symbols:check

      - name: Size / cold-start budget check
        working-directory: rust/bindings/wasm
        run: pnpm measure

      - name: Node smoke (edge wrapper)
        working-directory: rust/bindings/wasm
        run: pnpm test

      - name: Build core, server-wasm, server, mcp-core
        run: |
          pnpm --filter @solvapay/core build
          pnpm --filter @solvapay/server-wasm build
          pnpm --filter @solvapay/server build
          pnpm --filter @solvapay/mcp-core build

      - name: Edge implementation unit tests (WASM + TS rollback)
        run: |
          pnpm --filter @solvapay/server test:unit:edge-wasm
          pnpm --filter @solvapay/server test:unit:edge-ts

      - name: Webhook edge corpus (WASM then TS rollback)
        run: |
          # Edge-only replay: Node napi uses wall-clock and cannot honor fixture
          # `input.clock` (Step 37 gap). This gate proves the Step 38 edge path.
          SOLVAPAY_IMPL=rust node scripts/replay-webhook-edge-wasm.mjs
          SOLVAPAY_IMPL=ts node scripts/replay-webhook-edge-wasm.mjs
          # Full harness still green on the TS path for both node + edge bindings.
          SOLVAPAY_IMPL=ts pnpm exec vitest run scripts/contract-fixtures.test.ts -t webhook-verification

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.7.4'

      - name: Deno edge + mcp-core smoke
        run: |
          deno run --allow-read=packages,rust/bindings/wasm,node_modules \
            packages/mcp-core/scripts/deno-edge-smoke.mjs

      - name: Fetch-runtime validation
        run: pnpm validate:fetch-runtime

  documentation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    needs: lint-build-test
    # Runs after lint-build-test which already builds packages
    # We still need to install dependencies and build here because GitHub Actions
    # jobs run on separate runners and can't share filesystem state

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages
        # Packages must be built for TypeDoc to resolve subpath exports (e.g., @solvapay/auth/supabase)
        # which point to dist/ files. TypeDoc uses TypeScript's module resolution which needs these files.
        # Note: This runs after lint-and-test completes, but we still need to build here because
        # GitHub Actions jobs run on separate runners and can't share build artifacts without explicit upload/download

      - name: Validate documentation links
        id: validate-links
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_link_validation != 'true'
        run: pnpm exec tsx scripts/validate-doc-links.ts --skip-api
        continue-on-error: false
        # Validates non-generated documentation links (skips docs/api/** which are generated by docs repo)
        # Note: Documentation is built by the docs repo, not in this CI workflow

      - name: Check TypeDoc configuration
        id: check-typedoc
        run: pnpm docs:check
        continue-on-error: false
        # Validates TypeDoc can parse the codebase and generate JSON output
        # This catches JSDoc syntax errors and missing exports
        # Note: Actual documentation build happens in the docs repo, not here

      - name: Validate markdown files
        run: |
          # Check for common markdown issues
          echo "Checking markdown files for common issues..."

          # Check for files with no content (just headers)
          find docs -name "*.md" -type f ! -path "*/node_modules/*" ! -path "*/_media/*" ! -path "*/api/*" | while read file; do
            # Skip if file is too small (likely empty or just headers)
            if [ $(wc -l < "$file") -lt 5 ]; then
              echo "⚠️  Warning: $file seems very short (less than 5 lines)"
            fi
          done

          # Check for markdown files with no links or content
          find docs -name "*.md" -type f ! -path "*/node_modules/*" ! -path "*/_media/*" ! -path "*/api/*" -exec grep -L "." {} \; | while read file; do
            echo "⚠️  Warning: $file appears to be empty"
          done || true
        continue-on-error: true
        # Markdown validation is informational
