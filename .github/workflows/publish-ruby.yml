name: Publish Ruby (RubyGems)

# Separate from the npm Changesets workflow (`.github/workflows/publish.yml`).
# Builds platform gems via native-host `rake native gem` for the §7.7 matrix,
# runs `check-gems.rb`, then publishes with RubyGems Trusted Publishing (OIDC).
#
# Default path is dry-run: build + check-gems + local `gem install` (RubyGems
# has no TestPyPI equivalent). Real `gem push` is gated behind
# `workflow_dispatch` input `publish_to_rubygems=true` (or a `solvapay-ruby-v*`
# tag once maintainers enable that path).
#
# Version stamping (§7.7):
#   SOLVAPAY_RELEASE_VERSION → gem / native `version`
#   SOLVAPAY_CORE_SHA        → `native_build_info` coreSha
#
# rb-sys-dock cross-compile remains deferred (rbsys 0.9.128 / Magnus 0.7 mismatch).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-train version for the gem (e.g. 0.1.0)'
        required: true
        type: string
        default: '0.1.0'
      publish_to_rubygems:
        description: 'Publish to RubyGems.org (default: dry-run only)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'solvapay-ruby-v*'

permissions:
  contents: read

jobs:
  build-gems:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust/bindings/ruby
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
            os: ubuntu-latest
          - platform: aarch64-linux
            os: ubuntu-24.04-arm
          - platform: x86_64-darwin
            os: macos-13
          - platform: arm64-darwin
            os: macos-latest
          - platform: x64-mingw-ucrt
            os: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby + Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cargo-cache: true
          working-directory: rust/bindings/ruby

      - name: Resolve version + core SHA
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#solvapay-ruby-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "core_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Stamp version.rb
        shell: bash
        run: |
          ruby -e '
            path = "lib/solvapay/version.rb"
            version = ENV.fetch("VERSION")
            text = File.read(path)
            text = text.sub(/VERSION = ".*"/, "VERSION = \"#{version}\"")
            File.write(path, text)
          '
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Bundle install
        run: bundle install

      - name: Native platform gem
        run: bundle exec rake native gem
        env:
          SOLVAPAY_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          SOLVAPAY_CORE_SHA: ${{ steps.meta.outputs.core_sha }}

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-ruby-gem-${{ matrix.platform }}
          path: rust/bindings/ruby/pkg/*.gem
          if-no-files-found: error

  build-source-gem:
    name: build source gem
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/bindings/ruby
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby + Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cargo-cache: true
          working-directory: rust/bindings/ruby

      - name: Resolve version + core SHA
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#solvapay-ruby-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "core_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Stamp version.rb
        shell: bash
        run: |
          ruby -e '
            path = "lib/solvapay/version.rb"
            version = ENV.fetch("VERSION")
            text = File.read(path)
            text = text.sub(/VERSION = ".*"/, "VERSION = \"#{version}\"")
            File.write(path, text)
          '
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Bundle install
        run: bundle install

      - name: Build source gem
        run: bundle exec rake build
        env:
          SOLVAPAY_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          SOLVAPAY_CORE_SHA: ${{ steps.meta.outputs.core_sha }}

      - name: Upload source gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-ruby-source-gem
          path: rust/bindings/ruby/pkg/*.gem
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build-gems
      - build-source-gem
    defaults:
      run:
        working-directory: rust/bindings/ruby
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: rust/bindings/ruby/gems
          pattern: publish-ruby-*
          merge-multiple: true

      - name: check-gems.rb
        run: ruby scripts/check-gems.rb --dir gems

      - name: Dry-run local gem install
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_rubygems != true }}
        shell: bash
        run: |
          gem_file="$(find gems -name '*.gem' | head -n1)"
          test -n "${gem_file}"
          gem install --local "${gem_file}"
          ruby -e 'require "solvapay"; puts SolvaPay.version'

      - name: Configure RubyGems Credentials
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_rubygems == true) || startsWith(github.ref, 'refs/tags/solvapay-ruby-v') }}
        uses: rubygems/configure-rubygems-credentials@v1

      - name: Publish to RubyGems
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_rubygems == true) || startsWith(github.ref, 'refs/tags/solvapay-ruby-v') }}
        shell: bash
        run: |
          shopt -s nullglob
          for gem_file in gems/**/*.gem gems/*.gem; do
            echo "Pushing ${gem_file}"
            gem push "${gem_file}"
          done
