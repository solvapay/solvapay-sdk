name: Publish Stable Releases

# Changesets-driven stable publish.
#
# On every push to `main`, `changesets/action` opens (or updates) a
# "Version Packages" PR whose body enumerates every accumulated
# `.changeset/*.md` grouped by semver bump. Merging that PR applies
# the version bumps + regenerates CHANGELOG.md for every affected
# package, which then triggers this workflow again — this time with
# an empty `.changeset/` directory and bumped versions, so
# `changesets/action` takes the `publish` branch and ships to the
# `@latest` dist-tag with matching git tags.
#
# The "open Version Packages PR" leg uses a token minted from the
# `solvapay-release-bot` GitHub App rather than the default
# `GITHUB_TOKEN`. The org has `can_approve_pull_request_reviews: false`
# at the org level (and the corresponding repo-level toggle is grayed
# out), which blocks `GITHUB_TOKEN` from creating PRs. App tokens are
# governed by the App's own installation permissions and bypass that
# restriction cleanly. Required repo secrets: `RELEASE_APP_ID`,
# `RELEASE_APP_KEY` (full `.pem`), `NPM_TOKEN`.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-stable
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # The default `GITHUB_TOKEN` is held to read-only here. All
    # write-side GitHub API calls (commit, branch push, "Version
    # Packages" PR open/update) flow through the `solvapay-release-bot`
    # GitHub App token minted in the first step below — that token
    # bypasses the org policy that blocks `GITHUB_TOKEN` from creating
    # PRs (`can_approve_pull_request_reviews: false`). `id-token: write`
    # stays for npm provenance on the publish leg.
    permissions:
      contents: read
      id-token: write

    steps:
      # Mints a short-lived (60-minute) installation token for the
      # `solvapay-release-bot` GitHub App. PRs opened with this token are
      # authored as `solvapay-release-bot[bot]` and are not subject to
      # the org's "GitHub Actions cannot create or approve pull requests"
      # restriction, which only governs the default `GITHUB_TOKEN`.
      - name: Generate release-bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Catches the "stale preview baseline" failure mode we hit in April
      # 2026, where `core`/`auth`/`solvapay` sat at `1.0.8-preview.10` on
      # main and `pnpm publish` baked that string into every workspace dep
      # reference of the freshly-published siblings. Fail loud here rather
      # than after npm has already accepted the broken manifests.
      - name: Reject pre-release versions in workspace
        run: node scripts/assert-stable-workspace-versions.mjs

      - name: Check dependency health
        run: pnpm deps:check

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build:packages

      - name: Validate fetch-runtime — Node gate
        run: pnpm validate:fetch-runtime

      # Deno gate — type-checks examples/supabase-edge-mcp against the
      # last-published `@preview` versions of the workspace packages it
      # imports. See publish-preview.yml for the rationale around the
      # "one-commit-late" detection window.
      - name: Validate fetch-runtime — Deno gate (supabase-edge-mcp type-check)
        run: pnpm --filter @example/supabase-edge-mcp validate

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm changeset:version` is the monorepo's wrapper around
          # `changeset version`; same behaviour, respects our config.
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # Use the App-installation token so `changesets/action` can
          # create + update the "Version Packages" PR. `NPM_TOKEN` still
          # authenticates the publish step against the npm registry.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Post-publish verification — mirrors the guard in
      # publish-preview.yml. Only runs when `changesets/action` actually
      # published (i.e. merging the "Version Packages" PR), otherwise
      # there's nothing to verify. The action exposes `published` and
      # `publishedPackages` outputs we consume directly instead of
      # re-parsing the publish log.
      - name: Verify published packages landed on npm
        if: steps.changesets.outputs.published == 'true'
        run: node scripts/verify-npm-publishes.mjs --packages='${{ steps.changesets.outputs.publishedPackages }}'
