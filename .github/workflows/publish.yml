name: Publish Stable Releases

# Changesets-driven stable publish.
#
# On every push to `main`, `changesets/action` opens (or updates) a
# "Version Packages" PR whose body enumerates every accumulated
# `.changeset/*.md` grouped by semver bump. Merging that PR applies
# the version bumps + regenerates CHANGELOG.md for every affected
# package, which then triggers this workflow again — this time with
# an empty `.changeset/` directory and bumped versions, so
# `changesets/action` takes the `publish` branch and ships to the
# `@latest` dist-tag with matching git tags.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-stable
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency health
        run: pnpm deps:check

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build:packages

      - name: Validate fetch-runtime — Node gate
        run: pnpm validate:fetch-runtime

      # Deno gate — non-blocking until inaugural preview packages land on
      # npm. Once @solvapay/mcp-fetch@preview exists we can switch
      # deno.local.json to `npm:@solvapay/mcp-fetch@preview` + auto
      # node_modules resolution and flip this back to blocking.
      - name: Validate fetch-runtime — Deno gate (supabase-edge-mcp type-check)
        continue-on-error: true
        run: pnpm --filter @example/supabase-edge-mcp validate

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm changeset:version` is the monorepo's wrapper around
          # `changeset version`; same behaviour, respects our config.
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
