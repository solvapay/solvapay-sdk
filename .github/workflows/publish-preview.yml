name: Publish Preview Snapshot

# On every push to `dev`, run the pre-publish gates and cut a
# changesets snapshot to the `@preview` dist-tag. Each publish is
# addressable as `@solvapay/<pkg>@0.0.0-preview-<shortsha>` (stable
# version pin) plus a mutable `@preview` pointer at the latest.
on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: publish-preview
  cancel-in-progress: false

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency health
        run: pnpm deps:check

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build:packages

      - name: Validate fetch-runtime — Node gate
        run: pnpm validate:fetch-runtime

      # Deno gate — type-checks examples/supabase-edge-mcp against the
      # last-published `@preview` versions of the workspace packages it
      # imports. Catches Deno-incompatibility regressions one commit
      # late (the commit that introduced the break publishes, and the
      # next push's gate fails), which we accept as the simplest
      # workable tradeoff for pre-publish validation without juggling
      # local-dist / file: URL resolution.
      - name: Validate fetch-runtime — Deno gate (supabase-edge-mcp type-check)
        run: pnpm --filter @example/supabase-edge-mcp validate

      - name: Version snapshot
        run: pnpm changeset version --snapshot preview

      - name: Publish snapshot to @preview
        id: publish
        run: |
          set -o pipefail
          pnpm changeset publish --tag preview --no-git-tag 2>&1 | tee publish.log
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Post-publish verification — Changesets reports success based on
      # npm's exit code, but npm has been observed to exit 0 even when
      # brand-new scoped package names fail to create (granular token
      # scope, org create-restrictions, etc.). This step queries the
      # public registry for every line that Changesets claimed shipped
      # and fails the job if any package isn't fetchable after a retry
      # window.
      - name: Verify published packages landed on npm
        run: node scripts/verify-npm-publishes.mjs publish.log
