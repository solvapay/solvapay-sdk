name: Publish Preview Snapshot

# On every push to `dev`, run the pre-publish gates and cut a
# changesets snapshot to the `@preview` dist-tag. Each publish is
# addressable as `@solvapay/<pkg>@0.0.0-preview-<shortsha>` (stable
# version pin) plus a mutable `@preview` pointer at the latest.
on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: publish-preview
  cancel-in-progress: false

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency health
        run: pnpm deps:check

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build:packages

      - name: Validate fetch-runtime — Node gate
        run: pnpm validate:fetch-runtime

      # Deno gate — non-blocking until inaugural preview packages land on
      # npm. Once @solvapay/mcp-fetch@preview exists we can switch
      # deno.local.json to `npm:@solvapay/mcp-fetch@preview` + auto
      # node_modules resolution and flip this back to blocking. Tracking:
      # https://github.com/solvapay/solvapay-sdk/issues (follow-up).
      - name: Validate fetch-runtime — Deno gate (supabase-edge-mcp type-check)
        continue-on-error: true
        run: pnpm --filter @example/supabase-edge-mcp validate

      - name: Version snapshot
        run: pnpm changeset version --snapshot preview

      - name: Publish snapshot to @preview
        run: pnpm changeset publish --tag preview --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
