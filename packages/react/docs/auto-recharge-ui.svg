<svg xmlns="http://www.w3.org/2000/svg" width="500" height="1300" viewBox="0 0 500 1300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .card { fill:#ffffff; stroke:#e2e8f0; }
    .blocklabel { font-size:12px; font-weight:700; letter-spacing:.6px; fill:#64748b; }
    .title { font-size:15px; font-weight:600; fill:#0f172a; }
    .sub { font-size:13px; fill:#64748b; }
    .lab { font-size:14px; fill:#334155; }
    .inp { fill:#f8fafc; stroke:#cbd5e1; }
    .inpt { font-size:14px; fill:#0f172a; text-anchor:end; }
    .hint { font-size:12px; fill:#94a3b8; }
    .flabel { font-size:11px; font-weight:600; letter-spacing:.6px; fill:#64748b; }
    .sumtext { font-size:13px; fill:#3730a3; }
    .btnptext { font-size:14px; font-weight:600; fill:#ffffff; text-anchor:middle; }
    .btngtext { font-size:14px; font-weight:500; fill:#334155; text-anchor:middle; }
    .ph { font-size:13px; fill:#94a3b8; }
  </style>

  <rect width="500" height="1300" fill="#f1f5f9"/>

  <!-- ===== 1. Disabled ===== -->
  <text x="30" y="34" class="blocklabel">1 À DISABLED (COLLAPSED)</text>
  <g transform="translate(30,44)">
    <rect class="card" x="0" y="0" width="440" height="64" rx="12"/>
    <text x="20" y="30" class="title">Automatic recharge</text>
    <text x="20" y="50" class="sub">Keep your balance topped up automatically.</text>
    <rect x="376" y="19" width="44" height="26" rx="13" fill="#cbd5e1"/>
    <circle cx="389" cy="32" r="10" fill="#ffffff"/>
  </g>

  <!-- ===== 2. Enabled fixed ===== -->
  <text x="30" y="158" class="blocklabel">2 À ENABLED  FIXED AMOUNT (DEFAULT)</text>
  <g transform="translate(30,168)">
    <rect class="card" x="0" y="0" width="440" height="400" rx="12"/>
    <text x="20" y="30" class="title">Automatic recharge</text>
    <text x="20" y="50" class="sub">Keep your balance topped up automatically.</text>
    <rect x="376" y="20" width="44" height="26" rx="13" fill="#6366f1"/>
    <circle cx="407" cy="33" r="10" fill="#ffffff"/>

    <text x="20" y="94" class="lab">When my balance falls below</text>
    <rect class="inp" x="300" y="76" width="70" height="30" rx="8"/>
    <text x="362" y="96" class="inpt">$5</text>
    <text x="378" y="96" class="hint">H 500 cr</text>

    <text x="20" y="134" class="lab">Add to my balance</text>
    <rect class="inp" x="300" y="116" width="70" height="30" rx="8"/>
    <text x="362" y="136" class="inpt">$10</text>
    <text x="378" y="136" class="hint">H 1,000 cr</text>

    <circle cx="27" cy="166" r="6" fill="#ffffff" stroke="#6366f1" stroke-width="4"/>
    <text x="42" y="170" class="lab" font-size="13">Add a fixed amount</text>
    <circle cx="197" cy="166" r="6.5" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="211" y="170" class="lab" font-size="13">Top up to a target</text>

    <text x="20" y="204" class="lab">Monthly limit <tspan fill="#94a3b8">(optional)</tspan></text>
    <rect class="inp" x="300" y="186" width="70" height="30" rx="8"/>
    <text x="362" y="206" class="inpt">$100</text>

    <text x="20" y="240" class="flabel">PAYMENT METHOD</text>
    <rect class="inp" x="20" y="250" width="400" height="38" rx="8"/>
    <text x="32" y="274" font-size="14" fill="#0f172a">Visa """" 4242</text>
    <text x="404" y="274" font-size="14" fill="#94a3b8" text-anchor="end">¥</text>

    <rect x="20" y="302" width="400" height="42" rx="6" fill="#eef2ff"/>
    <rect x="20" y="302" width="3" height="42" fill="#6366f1"/>
    <text x="34" y="328" class="sumtext">We'll add $10 whenever your balance drops below $5.</text>

    <rect x="248" y="356" width="82" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="289" y="378" class="btngtext">Cancel</text>
    <rect x="340" y="356" width="80" height="34" rx="8" fill="#6366f1"/>
    <text x="380" y="378" class="btnptext">Save</text>
  </g>

  <!-- ===== 3. Target mode ===== -->
  <text x="30" y="612" class="blocklabel">3 À ENABLED  TARGET ("TOP UP TO")</text>
  <g transform="translate(30,622)">
    <rect class="card" x="0" y="0" width="440" height="192" rx="12"/>
    <text x="20" y="40" class="lab">When my balance falls below</text>
    <rect class="inp" x="350" y="22" width="70" height="30" rx="8"/>
    <text x="412" y="42" class="inpt">$5</text>

    <text x="20" y="80" class="lab">Top my balance back up to</text>
    <rect class="inp" x="300" y="62" width="70" height="30" rx="8"/>
    <text x="362" y="82" class="inpt">$25</text>
    <text x="378" y="82" class="hint">H 2,500 cr</text>

    <circle cx="27" cy="112" r="6.5" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="42" y="116" class="lab" font-size="13">Add a fixed amount</text>
    <circle cx="197" cy="112" r="6" fill="#ffffff" stroke="#6366f1" stroke-width="4"/>
    <text x="211" y="116" class="lab" font-size="13">Top up to a target</text>

    <rect x="20" y="134" width="400" height="44" rx="6" fill="#eef2ff"/>
    <rect x="20" y="134" width="3" height="44" fill="#6366f1"/>
    <text x="34" y="154" class="sumtext">We'll bring your balance back up to $25 whenever</text>
    <text x="34" y="170" class="sumtext">it drops below $5.</text>
  </g>

  <!-- ===== 4. Setup ===== -->
  <text x="30" y="858" class="blocklabel">4 À FIRST-TIME SETUP (NO SAVED CARD)</text>
  <g transform="translate(30,868)">
    <rect class="card" x="0" y="0" width="440" height="226" rx="12"/>
    <text x="20" y="34" class="flabel">PAYMENT METHOD</text>
    <rect x="20" y="44" width="400" height="96" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="5 4"/>
    <rect x="36" y="58" width="368" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="48" y="78" class="ph">Card number</text>
    <rect x="36" y="98" width="178" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="48" y="118" class="ph">MM / YY</text>
    <rect x="226" y="98" width="178" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="238" y="118" class="ph">CVC</text>
    <text x="20" y="160" font-size="11" fill="#94a3b8">Secured by Stripe</text>
    <rect x="20" y="172" width="400" height="42" rx="8" fill="#6366f1"/>
    <text x="220" y="198" class="btnptext">Set up auto-recharge</text>
  </g>

  <!-- ===== 5. Failed banner ===== -->
  <text x="30" y="1138" class="blocklabel">5 À FAILED RECHARGE (status / failureCount)</text>
  <g transform="translate(30,1148)">
    <rect x="0" y="0" width="440" height="116" rx="10" fill="#fef2f2" stroke="#fecaca"/>
    <circle cx="32" cy="34" r="11" fill="#dc2626"/>
    <text x="32" y="39" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">!</text>
    <text x="54" y="34" font-size="14" font-weight="600" fill="#b91c1c">Auto-recharge paused</text>
    <text x="54" y="56" font-size="13" fill="#991b1b">Your last recharge failed. Update your payment</text>
    <text x="54" y="74" font-size="13" fill="#991b1b">method to re-enable automatic top-ups.</text>
    <rect x="54" y="84" width="120" height="30" rx="7" fill="#ffffff" stroke="#dc2626"/>
    <text x="114" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#b91c1c">Update card</text>
  </g>
</svg>
