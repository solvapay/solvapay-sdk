# cbindgen config for the optional SolvaPay C ABI (Step 54).
language = "C"
include_guard = "SOLVAPAY_H"
pragma_once = true
autogen_warning = "/* @generated by cbindgen — do not edit. Regenerate: cargo build -p solvapay-c */"
documentation = true
documentation_style = "c"
style = "both"
usize_is_size_t = true

header = """\
/*
 * SolvaPay optional C ABI (Step 54 scaffold).
 *
 * Opaque client handles + generic JSON-envelope dispatch.
 * See docs/contributing/rust-core-sdk-redesign-v2.md §7.6 / §7.7.
 */
"""

[export]
include = [
  "SOLVAPAY_ABI_VERSION",
  "SolvapayClient",
  "SolvapayStatus",
  "solvapay_abi_version",
  "solvapay_version",
  "solvapay_client_new",
  "solvapay_client_call",
  "solvapay_verify_webhook",
  "solvapay_client_free",
  "solvapay_free_string",
]
item_types = ["enums", "structs", "functions", "constants"]

[export.rename]

[enum]
rename_variants = "None"
prefix_with_name = true

[parse]
parse_deps = false
clean = false
