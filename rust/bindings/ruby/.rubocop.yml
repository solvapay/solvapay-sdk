# Step 45T — rubocop on the Ruby facade (D18). TargetRubyVersion matches
# the gem floor in solvapay.gemspec / redesign §13.
AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'pkg/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'
    - 'ext/**/*'
    - 'test/**/*'
    - 'scripts/**/*'

# Generated surfaces keep emitter formatting; prefer emitter fixes over broad
# disables. Narrow exclusions only where cops fight keyword-heavy generated style.
Lint/UselessAssignment:
  Enabled: true

Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Layout/LineLength:
  Max: 120
  Exclude:
    - 'lib/solvapay/client.rb'
    - 'lib/solvapay/helpers.generated.rb'
    - 'lib/solvapay/_native.rb'
    - 'sig/**/*'

# Catalog method names are language-neutral (`get_*`, `is_*`); do not rename.
Naming/AccessorMethodName:
  Exclude:
    - 'lib/solvapay/client.rb'
    - 'lib/solvapay/helpers.generated.rb'

Naming/PredicatePrefix:
  Exclude:
    - 'lib/solvapay/client.rb'
    - 'lib/solvapay/helpers.generated.rb'

# RBS inline annotations use `#:` (no space). Steep requires that exact form.
Layout/LeadingCommentSpace:
  Exclude:
    - 'lib/solvapay/client.rb'
    - 'lib/solvapay/helpers.generated.rb'
    - 'lib/solvapay/facade.rb'
    - 'lib/solvapay/helpers.rb'
    - 'lib/solvapay/_native.rb'

# Envelope rescue uses `public_send(:code)` so steep accepts StandardError without
# a `code` method; prefer that over a typed cast.
Style/SendWithLiteralMethodName:
  Exclude:
    - 'lib/solvapay/_native.rb'

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma
