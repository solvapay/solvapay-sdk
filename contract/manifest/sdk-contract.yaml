  retryNextDelayMs:
    core: solvapay_core::retry::RetryPolicy::next_delay
    names:
      ts: retryNextDelayMs
      py: retry_next_delay_ms
      rb: retry_next_delay_ms
      go: RetryNextDelayMs
      rust: retry_next_delay_ms
    catalog:
      kind: none
    args:
      - name: attempt
        type: f64
        required: true
      - name: maxRetries
        type: "f64?"
        required: false
      - name: initialDelay
        type: "f64?"
        required: false
      - name: backoffStrategy
        type: "string?"
        required: false
    splitPathRefs: []
    return: value
    sync: sync
    envelope: sync
    artifact: decisions
    emitOrder: 41
    section: retry
    doc: >-
      Binding for `retryNextDelayMs`.


      Args: `{ maxRetries?, initialDelay?, backoffStrategy?, attempt }`.

      Envelope value is delay milliseconds, or `null` when retries are
      exhausted.
    rustFnName: retry_next_delay_ms
    call:
      kind: verbatim
    verbatimBody: |-
      let args = args_map(&args_json)?;
              let attempt = require_u32(&args, "attempt")?;
              let mut policy = RetryPolicy {
                  max_retries: DEFAULT_MAX_RETRIES,
                  initial_delay_ms: DEFAULT_INITIAL_DELAY_MS,
                  backoff: Backoff::Fixed,
              };
              if let Some(max_retries) = optional_u32(&args, "maxRetries")? {
                  policy.max_retries = max_retries;
              }
              if let Some(initial_delay) = optional_u64(&args, "initialDelay")? {
                  policy.initial_delay_ms = initial_delay;
              }
              if let Some(strategy) = optional_string(&args, "backoffStrategy")? {
                  policy.backoff = match strategy.as_str() {
                      "fixed" => Backoff::Fixed,
                      "linear" => Backoff::Linear,
                      "exponential" => Backoff::Exponential,
                      other => {
                          return Err(SdkError::transport(
                              format!(
                                  "args.backoffStrategy must be fixed|linear|exponential, got {other}"
                              ),
                              false,
                          ));
                      }
                  };
              }
              match policy.next_delay(attempt) {
                  None => Ok(Value::Null),
                  Some(delay) => {
                      let ms = u64::try_from(delay.as_millis()).unwrap_or(u64::MAX);
                      Ok(Value::from(ms))
                  }
              }
    docWasm: Binding for `retryNextDelayMs`.
