# SDK contract manifest — Phase 0 Step 2
# Canonical public-API catalog for cross-language parity.
# Validated by: pnpm manifest:check
#
# Go callable-surface methods take ctx context.Context as the first parameter
# (defaults.goContextFirstParam). Emitters must not invent this parameter.

# Shadow-mode volatile-field rules (step 25). Per-operation `shadow.volatile`
# JSON Pointers (optional) are applied in addition to these globals.
shadow:
  globalVolatileKeys:
    - createdAt
    - updatedAt
    - id
    - reference
    - idempotencyKey
    - clientSecret
    - sessionId
    - email
    # Product/plan names must differ per side on live backends (unique index).
    - name
  volatileKeySuffixes:
    - Ref
  refPrefixes:
    - prd_
    - pln_
    - cus_
    - cusess_
    - pur_
    - pi_
    - ses_
    - usg_
    - cs_
    - top_
    - mcp_

